name: N60Pro OpenWrt Auto Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 🔥 释放磁盘
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget \
          python3 python3-pip

      - name: Clone source
        run: |
          git clone https://github.com/padavanonly/immortalwrt-mt798x-24.10 openwrt

      # ❗ 删除问题包（必须）
      - name: Remove problematic packages
        run: |
          rm -rf openwrt/package/emortal || true

      - name: Feeds update
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ❗ 放在 feeds 后（关键顺序）
      - name: Load config
        run: |
          cp .config openwrt/.config

      # 🔥 修复 MTK 以太网编译炸裂问题（重点！！！）
      - name: Fix MTK ETH compile issue
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_ETH=y/# CONFIG_MTK_ETH is not set/' .config || true
          sed -i 's/CONFIG_NET_MEDIATEK_SOC=y/# CONFIG_NET_MEDIATEK_SOC is not set/' .config || true

      # 🔥 强制 WiFi 内建（防止模块丢失）
      - name: Force WiFi built-in
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_MT_WIFI=m/CONFIG_MTK_MT_WIFI=y/' .config
          sed -i 's/CONFIG_MTK_WIFI_MODE_AP=m/CONFIG_MTK_WIFI_MODE_AP=y/' .config

      - name: Defconfig
        run: |
          cd openwrt
          make defconfig

      - name: Download
        run: |
          cd openwrt
          make download -j4

      # 🔥 编译（更稳策略）
      - name: Compile
        run: |
          cd openwrt
          make -j2 || make -j1 V=sc

      # 📦 日志
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/build_dir
            openwrt/logs
            openwrt/tmp

      # 📦 固件
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/

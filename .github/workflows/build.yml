name: N60Pro OpenWrt Auto Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 释放磁盘
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget \
          python3 python3-pip

      - name: Clone source
        run: |
          git clone https://github.com/padavanonly/immortalwrt-mt798x-24.10 openwrt

      # 删除问题包
      - name: Remove problematic packages
        run: |
          rm -rf openwrt/package/emortal || true

      - name: Feeds update & install
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp .config openwrt/.config

      # 修复 MTK 以太网编译问题
      - name: Fix MTK ETH compile issue
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_ETH=y/# CONFIG_MTK_ETH is not set/' .config || true
          sed -i 's/CONFIG_NET_MEDIATEK_SOC=y/# CONFIG_NET_MEDIATEK_SOC is not set/' .config || true

      # 强制 WiFi 内建
      - name: Force WiFi built-in
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_MT_WIFI=m/CONFIG_MTK_MT_WIFI=y/' .config
          sed -i 's/CONFIG_MTK_WIFI_MODE_AP=m/CONFIG_MTK_WIFI_MODE_AP=y/' .config

      - name: Defconfig
        run: |
          cd openwrt
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j4

      # 编译
      - name: Compile
        run: |
          cd openwrt
          make -j2 || make -j1 V=sc

      # 🔥 关键修复：删除文件名带冒号的非法文件（解决你报错的核心）
      - name: Clean invalid files (colon in filename)
        if: always()
        run: |
          find openwrt -type f -name "*:*" -delete

      # 打包固件
      - name: Pack firmware
        run: |
          cd openwrt
          mkdir -p bin
          
          echo "==== 查找固件 ===="
          find ./bin/targets/ -type f -name "*.bin"
          
          # 复制固件
          find ./bin/targets/ -type f \( -name "*.bin" -o -name "*.img" \) -exec cp {} bin/ \;
          
          cd bin
          echo "==== 当前固件 ===="
          ls -lh
          
          # 检查是否为空
          if [ -z "$(ls *.bin 2>/dev/null)" ]; then
            echo "❌ 没有找到固件，编译可能失败"
            exit 1
          fi
          
          zip -r firmware.zip *.bin *.img

      # 📦 上传日志（修复了格式）
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/build_dir
            openwrt/logs
            openwrt/tmp
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false

      # 📦 上传固件
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/firmware.zip

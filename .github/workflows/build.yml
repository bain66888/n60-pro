name: N60Pro OpenWrt Auto Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 安装依赖
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget python3 python3-pip

      # 克隆源码
      - name: Clone source
        run: |
          git clone https://github.com/padavanonly/immortalwrt-mt798x-24.10 openwrt

      # 删除有问题包
      - name: Remove problematic packages
        run: rm -rf openwrt/package/emortal || true

      # 更新 feeds
      - name: Feeds update & install
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 复制配置文件
      - name: Load config
        run: cp .config openwrt/.config

      # 修复 MTK ETH 问题
      - name: Fix MTK ETH compile issue
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_ETH=y/# CONFIG_MTK_ETH is not set/' .config || true
          sed -i 's/CONFIG_NET_MEDIATEK_SOC=y/# CONFIG_NET_MEDIATEK_SOC is not set/' .config || true

      # 强制 WiFi 内建
      - name: Force WiFi built-in
        run: |
          cd openwrt
          sed -i 's/CONFIG_MTK_MT_WIFI=m/CONFIG_MTK_MT_WIFI=y/' .config
          sed -i 's/CONFIG_MTK_WIFI_MODE_AP=m/CONFIG_MTK_WIFI_MODE_AP=y/' .config

      # defconfig
      - name: Defconfig
        run: |
          cd openwrt
          make defconfig

      # 下载依赖
      - name: Download dependencies
        run: |
          cd openwrt
          make download -j4

      # 编译
      - name: Compile
        run: |
          cd openwrt
          make -j2 || make -j1 V=sc

      # 删除文件名非法的文件
      - name: Clean invalid files
        run: |
          find openwrt -type f -name "*:*" -delete

      # 打包 bin 文件
      - name: Pack firmware
        run: |
          cd openwrt
          mkdir -p bin/firmware
          find ./bin/targets/ -type f -name "*.bin" -exec cp {} bin/firmware/ \;
          cd bin/firmware
          zip -r firmware.zip *.bin

      # 上传固件
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/firmware/firmware.zip

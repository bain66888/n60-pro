name: N60Pro OpenWrt Auto Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - uses: actions/checkout@v4

  # 🔥 释放磁盘空间（加强版）
  - name: Free disk space
    run: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /opt/ghc
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /usr/local/share/boost
      sudo rm -rf /usr/local/lib/node_modules
      df -h

  - name: Install dependencies
    run: |
      sudo apt update
      sudo apt install -y build-essential clang flex bison g++ gawk \
      gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
      python3-distutils rsync unzip zlib1g-dev file wget \
      python3 python3-pip

  - name: Clone source
    run: |
      git clone https://github.com/padavanonly/immortalwrt-mt798x-24.10 openwrt

  # ❗ 删除高危包（关键）
  - name: Remove problematic packages
    run: |
      rm -rf openwrt/package/emortal || true

  - name: Copy custom files
    run: |
      cp -r files openwrt/ || true

  - name: Fix permissions
    run: |
      chmod +x openwrt/files/etc/uci-defaults/99-custom || true

  - name: Feeds update
    run: |
      cd openwrt
      ./scripts/feeds update -a
      ./scripts/feeds install -a

  - name: Load config
    run: |
      cp .config openwrt/.config

  - name: Defconfig
    run: |
      cd openwrt
      make defconfig

  - name: Download
    run: |
      cd openwrt
      make download -j4

  # 🔥 关键编译阶段（稳定版）
  - name: Compile
    run: |
      cd openwrt
      make -j2 || make -j1 V=sc

  # 🔥 无论成功失败都上传日志
  - name: Upload logs
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: |
        openwrt/build_dir
        openwrt/logs
        openwrt/tmp

  - name: Upload firmware
    if: success()
    uses: actions/upload-artifact@v4
    with:
      name: firmware
      path: openwrt/bin/targets/
```
